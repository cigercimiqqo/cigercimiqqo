<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciğerci Kategori İkonları</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fafafa;
            padding: 60px 20px;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: #1a1a1a;
            margin-bottom: 50px;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 40px 30px;
            max-width: 960px;
            margin: 0 auto;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .item svg {
            width: 56px;
            height: 56px;
            transition: transform 0.2s ease;
        }

        .item:hover svg {
            transform: scale(1.08);
        }

        .item span {
            font-size: 0.8rem;
            color: #444;
            font-weight: 500;
            text-align: center;
            line-height: 1.3;
        }

        .divider {
            max-width: 960px;
            margin: 60px auto;
            border: none;
            border-top: 1px solid #e5e5e5;
        }

        .sizes-demo {
            max-width: 960px;
            margin: 0 auto;
            text-align: center;
        }

        .sizes-demo h2 {
            font-size: 1rem;
            color: #888;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .size-row {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .size-row .s-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .size-row .s-item small {
            color: #aaa;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<h1>Kategori İkonları</h1>

<div class="grid">

    <!-- ÇORBALAR -->
    <div class="item">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 32h48" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M12 32c0 0 2 18 20 18s20-18 20-18" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M32 50v4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M24 54h16" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M22 26c0-3 4-3 4-6" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
            <path d="M32 24c0-3 4-3 4-6" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
            <path d="M42 26c0-3-4-3-4-6" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Çorbalar</span>
    </div>

    <!-- ARA SICAKLAR -->
    <div class="item">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Tabak -->
            <ellipse cx="32" cy="48" rx="22" ry="5" stroke="#1a1a1a" stroke-width="2.5"/>
            <!-- Sigara böreği 1 -->
            <rect x="16" y="28" width="24" height="7" rx="3.5" stroke="#1a1a1a" stroke-width="2" transform="rotate(-8 28 31)"/>
            <!-- Sigara böreği 2 -->
            <rect x="20" y="18" width="22" height="7" rx="3.5" stroke="#1a1a1a" stroke-width="2" transform="rotate(5 31 21)"/>
            <!-- Sigara böreği 3 -->
            <rect x="18" y="37" width="26" height="7" rx="3.5" stroke="#1a1a1a" stroke-width="2" transform="rotate(-2 31 40)"/>
            <!-- Sos kabı -->
            <circle cx="50" cy="36" r="5" stroke="#1a1a1a" stroke-width="2"/>
            <circle cx="50" cy="36" r="2" fill="#1a1a1a"/>
        </svg>
        <span>Ara Sıcaklar</span>
    </div>

    <!-- FIRSAT İKİLİ -->
    <div class="item">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Sol tabak -->
            <path d="M6 38c0 0 3 10 16 10s16-10 16-10" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M6 38h32" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Sağ tabak -->
            <path d="M26 42c0 0 3 10 16 10s16-10 16-10" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M26 42h32" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Fiyat etiketi -->
            <path d="M44 10l8 0 4 4-4 4h-8v-8z" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="47" cy="14" r="1.2" fill="#1a1a1a"/>
            <path d="M44 14h-12" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
            <!-- Yüzde -->
            <path d="M14 12l10 10" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
            <circle cx="14" cy="12" r="2.5" stroke="#1a1a1a" stroke-width="2"/>
            <circle cx="24" cy="22" r="2.5" stroke="#1a1a1a" stroke-width="2"/>
        </svg>
        <span>Fırsat İkili</span>
    </div>

    <!-- KEBAPLAR -->
    <div class="item">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Şiş -->
            <line x1="32" y1="4" x2="32" y2="60" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Et parçaları -->
            <path d="M25 14c0-2.5 2.5-4 7-4s7 1.5 7 4-2.5 4-7 4-7-1.5-7-4z" stroke="#1a1a1a" stroke-width="2"/>
            <path d="M26 24c0-2 2-3.5 6-3.5s6 1.5 6 3.5-2 3.5-6 3.5-6-1.5-6-3.5z" fill="#1a1a1a" opacity="0.15" stroke="#1a1a1a" stroke-width="2"/>
            <path d="M25 34c0-2.5 2.5-4 7-4s7 1.5 7 4-2.5 4-7 4-7-1.5-7-4z" stroke="#1a1a1a" stroke-width="2"/>
            <path d="M26 44c0-2 2-3.5 6-3.5s6 1.5 6 3.5-2 3.5-6 3.5-6-1.5-6-3.5z" fill="#1a1a1a" opacity="0.15" stroke="#1a1a1a" stroke-width="2"/>
            <!-- Sebze arası -->
            <rect x="30" y="18" width="4" height="2" rx="1" fill="#1a1a1a"/>
            <rect x="30" y="38" width="4" height="2" rx="1" fill="#1a1a1a"/>
        </svg>
        <span>Kebaplar</span>
    </div>

    <!-- PİDELER -->
    <div class="item">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Pide kayık formu -->
            <path d="M4 32 Q32 10 60 32 Q32 54 4 32Z" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
            <!-- İç çizgiler - kenar kıvrım -->
            <path d="M10 32 Q32 18 54 32" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="0" opacity="0.4"/>
            <path d="M10 32 Q32 46 54 32" stroke="#1a1a1a" stroke-width="1.5" opacity="0.4"/>
            <!-- Malzeme detayları -->
            <circle cx="26" cy="30" r="2.5" stroke="#1a1a1a" stroke-width="1.5"/>
            <circle cx="38" cy="30" r="2.5" stroke="#1a1a1a" stroke-width="1.5"/>
            <circle cx="32" cy="36" r="2.5" stroke="#1a1a1a" stroke-width="1.5"/>
            <!-- Uç noktalar -->
            <circle cx="5" cy="32" r="1.5" fill="#1a1a1a"/>
            <circle cx="59" cy="32" r="1.5" fill="#1a1a1a"/>
        </svg>
        <span>Pideler</span>
    </div>

    <!-- DÜRÜMLER -->
    <div class="item">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Dürüm gövde - konik sarmal -->
            <path d="M20 6 L46 6 L40 58 L26 58Z" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
            <!-- Lavaş kıvrım çizgisi üst -->
            <path d="M20 6 Q33 14 46 6" stroke="#1a1a1a" stroke-width="2"/>
            <!-- Alt kağıt sarma -->
            <line x1="24" y1="40" x2="42" y2="40" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="3,2"/>
            <path d="M28 40 L26 58 L40 58 L38 40" stroke="#1a1a1a" stroke-width="1.5" opacity="0.4"/>
            <!-- İçinden taşan malzeme -->
            <circle cx="30" cy="10" r="2.5" stroke="#1a1a1a" stroke-width="1.5"/>
            <circle cx="37" cy="8" r="2" stroke="#1a1a1a" stroke-width="1.5"/>
            <path d="M28 7 Q26 2 30 3" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M38 6 Q40 1 42 4" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Dürümler</span>
    </div>

    <!-- TAVALAR -->
    <div class="item">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Tava gövde -->
            <circle cx="28" cy="36" r="20" stroke="#1a1a1a" stroke-width="2.5"/>
            <!-- İç halka -->
            <circle cx="28" cy="36" r="14" stroke="#1a1a1a" stroke-width="1.5" opacity="0.3"/>
            <!-- Sap -->
            <path d="M48 36 h12" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="58" cy="36" r="1.5" stroke="#1a1a1a" stroke-width="1.5"/>
            <!-- Yemek parçaları -->
            <circle cx="22" cy="32" r="3" stroke="#1a1a1a" stroke-width="1.5"/>
            <circle cx="32" cy="30" r="2.5" stroke="#1a1a1a" stroke-width="1.5"/>
            <circle cx="26" cy="40" r="2.5" stroke="#1a1a1a" stroke-width="1.5"/>
            <circle cx="34" cy="40" r="2" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
            <!-- Buhar -->
            <path d="M20 14c0-3 3-3 3-6" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
            <path d="M30 12c0-3 3-3 3-6" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        </svg>
        <span>Tavalar</span>
    </div>

    <!-- KİREMİT -->
    <div class="item">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Kiremit tabak dikdörtgen -->
            <path d="M8 18 h48 l-4 32 H12 Z" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
            <!-- Kenar çizgisi -->
            <path d="M10 24 h44" stroke="#1a1a1a" stroke-width="1.5" opacity="0.3"/>
            <!-- Yemek parçaları -->
            <circle cx="24" cy="34" r="3.5" stroke="#1a1a1a" stroke-width="1.5"/>
            <circle cx="34" cy="32" r="3" stroke="#1a1a1a" stroke-width="1.5"/>
            <circle cx="44" cy="35" r="2.5" stroke="#1a1a1a" stroke-width="1.5"/>
            <circle cx="28" cy="42" r="2" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
            <circle cx="38" cy="41" r="2.5" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
            <!-- Buhar -->
            <path d="M26 12c0-3 3-3 3-6" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
            <path d="M38 10c0-3 3-3 3-6" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        </svg>
        <span>Kiremit</span>
    </div>

    <!-- İNDİRİMLİ KİLOLUK -->
    <div class="item">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Ağırlık/Tartı bloğu -->
            <path d="M16 28 h32 v24 a4 4 0 01-4 4 H20 a4 4 0 01-4-4 V28z" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
            <!-- Üst tutma yeri -->
            <path d="M24 28 v-4 a8 8 0 0116 0 v4" stroke="#1a1a1a" stroke-width="2.5"/>
            <!-- KG yazısı -->
            <text x="32" y="46" fill="#1a1a1a" font-size="12" font-weight="700" text-anchor="middle" font-family="Inter, sans-serif">KG</text>
            <!-- İndirim etiketi -->
            <circle cx="50" cy="18" r="9" stroke="#1a1a1a" stroke-width="2"/>
            <text x="50" y="22" fill="#1a1a1a" font-size="10" font-weight="700" text-anchor="middle" font-family="Inter, sans-serif">%</text>
        </svg>
        <span>İndirimli<br>Kiloluk Menüler</span>
    </div>

    <!-- TATLILAR -->
    <div class="item">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Künefe / tatlı tabağı alt -->
            <ellipse cx="32" cy="50" rx="22" ry="5" stroke="#1a1a1a" stroke-width="2.5"/>
            <!-- Künefe gövde -->
            <path d="M12 50 C12 34 20 26 32 26 C44 26 52 34 52 50" stroke="#1a1a1a" stroke-width="2.5"/>
            <!-- Tel kadayıf dokusu -->
            <path d="M18 44 Q25 38 32 44 Q39 38 46 44" stroke="#1a1a1a" stroke-width="1.5" opacity="0.4"/>
            <path d="M20 38 Q26 32 32 38 Q38 32 44 38" stroke="#1a1a1a" stroke-width="1.5" opacity="0.3"/>
            <!-- Üstteki fıstık / süsleme -->
            <circle cx="28" cy="32" r="1.5" fill="#1a1a1a" opacity="0.5"/>
            <circle cx="32" cy="30" r="1.5" fill="#1a1a1a" opacity="0.5"/>
            <circle cx="36" cy="32" r="1.5" fill="#1a1a1a" opacity="0.5"/>
            <!-- Şurup damlası -->
            <path d="M22 48 c0 0 1-3 3 0" stroke="#1a1a1a" stroke-width="1.2" opacity="0.4"/>
            <path d="M38 47 c0 0 1-3 3 0" stroke="#1a1a1a" stroke-width="1.2" opacity="0.4"/>
            <!-- Buhar -->
            <path d="M28 20c0-3 3-3 3-6" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
            <path d="M36 18c0-3-3-3-3-6" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        </svg>
        <span>Tatlılar</span>
    </div>

    <!-- İÇECEKLER -->
    <div class="item">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Bardak -->
            <path d="M18 12 L22 54 h20 L46 12" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
            <!-- Bardak ağzı -->
            <path d="M16 12 h32" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Sıvı seviyesi -->
            <path d="M22 28 h20" stroke="#1a1a1a" stroke-width="1.5" opacity="0.4"/>
            <!-- Pipet -->
            <line x1="40" y1="6" x2="36" y2="34" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Limon dilimi -->
            <path d="M46 12 Q52 8 54 14" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
            <path d="M46 12 L54 14" stroke="#1a1a1a" stroke-width="1.5"/>
            <!-- Buz küpü -->
            <rect x="26" y="30" width="6" height="6" rx="1" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(8 29 33)"/>
            <rect x="34" y="34" width="5" height="5" rx="1" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-5 36 36)"/>
        </svg>
        <span>İçecekler</span>
    </div>

</div>

<hr class="divider">

<!-- BOYUT ÖNİZLEME -->

        <div class="s-item">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none">

        <div class="s-item">
            <svg width="96" height="96" viewBox="0 0 64 64" fill="none">
